version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
      POSTGRES_DB: approval
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://approval:approval@db:5432/approval
      ENV: local
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

volumes:
  db_data:
